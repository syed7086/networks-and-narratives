name: Phase 3 — Feature or polish
description: New section, UI work, or deployment polish
title: "[Phase 3] "
labels: ["phase-3"]
body:
  - type: markdown
    attributes:
      value: |
        Features that require component or layout changes.
        Reference `code.html` or `DESIGN.md` where relevant.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Photography section
        - Blog section
        - SEO / favicon / Open Graph
        - Contact form
        - Navigation / layout
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should be built or changed?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Done when
    validations:
      required: true
